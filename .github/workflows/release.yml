name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.2.0)"
        required: true
        type: string

permissions:
  contents: write
  id-token: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Type check
        run: bun run lint
      - name: Run tests
        run: bun test

  approve-release:
    name: Approve Release
    runs-on: ubuntu-latest
    needs: test
    environment: production
    steps:
      - run: echo "Release approved."

  publish:
    needs: approve-release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Clean and build
        run: |
          rm -rf dist
          bun build ./src/index.ts --outdir dist --target bun --sourcemap=external
          bun build ./src/lib.ts --outdir dist --target bun --sourcemap=external
          bun x tsc --emitDeclarationOnly --outDir dist
      - name: Setup npm auth
        run: echo "//registry.npmjs.org/:_authToken=${{ secrets.NPM_TOKEN }}" > ~/.npmrc
      - name: Check if already published
        id: check
        run: |
          PKG_NAME=$(node -p "require('./package.json').name")
          PKG_VERSION=$(node -p "require('./package.json').version")
          if npm view "$PKG_NAME@$PKG_VERSION" version 2>/dev/null; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.check.outputs.skip == 'false'
        run: npm publish --provenance --access public --ignore-scripts
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - name: Create tag and release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="v$(node -p "require('./package.json').version")"
          git tag "$TAG" 2>/dev/null && git push origin "$TAG" || echo "Tag exists"
          gh release create "$TAG" --title "$TAG" --generate-notes || echo "Release exists"
